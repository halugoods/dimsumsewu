<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Order Online - Dimsum Sewu</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    
    <meta name="theme-color" content="#f8fafc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dimsum Sewu">
    <link rel="apple-touch-icon" href="logo.png">

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #f8fafc;
            font-family: 'Segoe UI', sans-serif;
            -webkit-overflow-scrolling: touch;
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block; 
        }
    </style>
</head>
<body>

    <iframe id="gas-frame" 
            src="https://script.google.com/macros/s/AKfycbwtOPddYuP0Gzz2NapWtBZe5XjOx5Isym4_1Az8qq7zHJMeaGdcQf88d1Ndb31hkWGzOg/exec?mode=order" 
            allowfullscreen 
            allow="clipboard-read; clipboard-write; geolocation"
            sandbox="allow-scripts allow-top-navigation allow-top-navigation-by-user-activation allow-forms allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-downloads allow-modals">
    </iframe>

    <script>
        window.addEventListener('DOMContentLoaded', function() {
            var urlParams = window.location.search;
            var iframe = document.getElementById('gas-frame');
            
            // Bypass masalah parameter URL
            if (urlParams) {
                iframe.src = iframe.src + urlParams.replace('?', '&');
            }
        });
    </script>
</body>
</html>
